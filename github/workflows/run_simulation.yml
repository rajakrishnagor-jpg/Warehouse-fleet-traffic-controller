name: Execute Warehouse Trajectory Simulation

on: [push] # Triggers every single time you hit save/commit

jobs:
  run-robotics-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Diagnostics Simulation
        run: python traffic_controller.py

        
